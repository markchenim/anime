name: Release Turtle Rabbit

on:
  push:
    tags:
      - "v*-turtle-rabbit"

permissions:
  contents: write

jobs:
  render-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install
        working-directory: turtle-rabbit

      - name: Render video
        run: npm run render
        working-directory: turtle-rabbit

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 龟兔赛跑 — ${{ github.ref_name }}
          body: |
            ## 🐢🐰 龟兔赛跑 — ${{ github.ref_name }}

            自动渲染的动画视频。

            - **项目**: turtle-rabbit
            - **提交**: ${{ github.sha }}
          files: turtle-rabbit/renders/*.mp4
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
